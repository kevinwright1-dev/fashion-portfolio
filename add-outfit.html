<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Outfit - Fashion Closet</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <style>
        .add-outfit-container {
            max-width: 900px;
            margin: 2rem auto;
            background: #111;
            padding: 2rem;
            border: 1px solid #222;
            border-radius: 8px;
        }

        .two-column {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
        }

        .image-upload-section {
            text-align: center;
            padding: 2rem;
            border: 2px dashed #333;
            border-radius: 8px;
            background: #0a0a0a;
            position: relative;
        }

        .image-preview {
            max-width: 100%;
            max-height: 500px;
            object-fit: contain;
            margin-bottom: 1rem;
            display: none;
        }

        .image-preview.show {
            display: block;
        }

        .upload-placeholder {
            padding: 3rem;
            color: #666;
        }

        .upload-placeholder.hidden {
            display: none;
        }

        .file-input-wrapper {
            position: relative;
            display: inline-block;
        }

        .file-input-wrapper input[type="file"] {
            position: absolute;
            opacity: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
        }

        .file-input-label {
            display: inline-block;
            padding: 1rem 2rem;
            background: #000;
            color: #fff;
            border: 1px solid #fff;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 0.9rem;
            letter-spacing: 1px;
        }

        .file-input-label:hover {
            background: #222;
        }

        .success-message {
            background: #00ff0020;
            border: 1px solid #00ff00;
            color: #6bff6b;
            padding: 1rem;
            margin-bottom: 1rem;
            border-radius: 4px;
            text-align: center;
        }

        .error-message {
            background: #ff000020;
            border: 1px solid #ff0000;
            color: #ff6b6b;
            padding: 1rem;
            margin-bottom: 1rem;
            border-radius: 4px;
            text-align: center;
        }

        .form-actions {
            display: flex;
            gap: 1rem;
            margin-top: 2rem;
        }

        .form-actions button {
            flex: 1;
        }

        .cancel-btn {
            background: transparent;
            border: 1px solid #666;
            color: #666;
        }

        .cancel-btn:hover {
            background: #111;
            border-color: #999;
            color: #999;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .next-btn {
            background: #fff;
            color: #000;
            font-weight: bold;
        }

        .next-btn:hover {
            background: #ddd;
        }

        @media (max-width: 768px) {
            .two-column {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <nav>
        <a href="index.html">HOME</a>
        <a href="closet.html">CLOSET</a>
        <a href="fits.html">FIT</a>
        <a href="inspo.html">INSPO</a>
        <a href="guestbook.html">COMMENTS</a>
        <a href="profile.html">PROFILE</a>
    </nav>

    <div class="add-outfit-container">
        <h1 style="text-align: center; margin-bottom: 2rem;">Share Your Fit</h1>

        <div id="message-container"></div>

        <div class="two-column">
            <!-- Left: Image Upload -->
            <div>
                <h3 style="margin-bottom: 1rem;">Outfit Photo</h3>
                <div class="image-upload-section">
                    <img id="image-preview" class="image-preview" src="" alt="Preview">
                    <div id="upload-placeholder" class="upload-placeholder">
                        <p style="font-size: 1.5rem; margin-bottom: 1rem;">📸</p>
                        <p>Upload your fit pic</p>
                    </div>
                    <div class="file-input-wrapper">
                        <label class="file-input-label">
                            Choose Photo
                            <input type="file" id="image-input" accept="image/*" required>
                        </label>
                    </div>
                    <p style="font-size: 0.75rem; color: #666; margin-top: 0.5rem;">Max 10MB • JPG, PNG, GIF, WEBP</p>
                </div>
            </div>

            <!-- Right: Outfit Details -->
            <div>
                <h3 style="margin-bottom: 1rem;">Details</h3>
                <form id="outfit-form">
                    <div class="form-group">
                        <label for="title">Title: *</label>
                        <input type="text" id="title" placeholder="e.g., Downtown Vibes" required>
                    </div>

                    <div class="form-group">
                        <label for="description">Description:</label>
                        <textarea id="description" rows="4" placeholder="Tell us about this fit..."></textarea>
                    </div>

                    <div class="form-group">
                        <label for="date-worn">Date Worn:</label>
                        <input type="date" id="date-worn">
                    </div>

                    <div class="form-group">
                        <label for="occasion">Occasion:</label>
                        <input type="text" id="occasion" placeholder="e.g., Concert, Date Night, Casual">
                    </div>

                    <div class="form-group">
                        <label for="location">Location:</label>
                        <input type="text" id="location" placeholder="e.g., NYC, Atlanta">
                    </div>

                    <div class="form-actions">
                        <button type="button" class="cancel-btn" id="cancel-btn">Cancel</button>
                        <button type="submit" class="next-btn" id="submit-btn">Post Outfit</button>
                    </div>

                    <p style="font-size: 0.8rem; color: #666; text-align: center; margin-top: 1rem;">
                        💡 After posting, you can tag items from your closet!
                    </p>
                </form>
            </div>
        </div>
    </div>

    <script>
        const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);
        let currentUser = null;
        let selectedFile = null;

        // Initialize
        init();

        async function init() {
            // Check auth
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (!session) {
                window.location.href = 'auth.html';
                return;
            }

            currentUser = session.user;
        }

        // Image preview handler
        document.getElementById('image-input').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;

            selectedFile = file;

            // Validate file size (10MB)
            if (file.size > 10 * 1024 * 1024) {
                showMessage('Image must be less than 10MB', 'error');
                selectedFile = null;
                return;
            }

            // Validate file type
            if (!file.type.startsWith('image/')) {
                showMessage('Please upload an image file', 'error');
                selectedFile = null;
                return;
            }

            // Show preview
            const reader = new FileReader();
            reader.onload = (e) => {
                const preview = document.getElementById('image-preview');
                preview.src = e.target.result;
                preview.classList.add('show');
                document.getElementById('upload-placeholder').classList.add('hidden');
            };
            reader.readAsDataURL(file);
        });

        // Form submit handler
        document.getElementById('outfit-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            if (!selectedFile) {
                showMessage('Please upload a photo', 'error');
                return;
            }

            const submitBtn = document.getElementById('submit-btn');
            submitBtn.disabled = true;
            submitBtn.textContent = 'Uploading...';

            try {
                showMessage('Uploading outfit...', 'info');

                // Upload image to storage
                const fileExt = selectedFile.name.split('.').pop();
                const fileName = `${currentUser.id}/${Date.now()}_${Math.random().toString(36).substring(7)}.${fileExt}`;

                const { data: uploadData, error: uploadError } = await supabaseClient.storage
                    .from('outfits')
                    .upload(fileName, selectedFile, {
                        cacheControl: '3600',
                        upsert: false
                    });

                if (uploadError) throw uploadError;

                // Get public URL
                const { data: { publicUrl } } = supabaseClient.storage
                    .from('outfits')
                    .getPublicUrl(fileName);

                // Get form data
                const title = document.getElementById('title').value.trim();
                const description = document.getElementById('description').value.trim();
                const dateWorn = document.getElementById('date-worn').value;
                const occasion = document.getElementById('occasion').value.trim();
                const location = document.getElementById('location').value.trim();

                // Insert into database
                const { data, error } = await supabaseClient
                    .from('outfits')
                    .insert([{
                        user_id: currentUser.id,
                        title,
                        description: description || null,
                        date_worn: dateWorn || null,
                        occasion: occasion || null,
                        location: location || null,
                        image_url: publicUrl
                    }])
                    .select();

                if (error) throw error;

                showMessage('Outfit posted successfully!', 'success');

                // Redirect to tag page or fits page
                setTimeout(() => {
                    // For now, go to fits page. Later we'll add tagging
                    window.location.href = `tag-outfit.html?id=${data[0].id}`;
                }, 1000);

            } catch (error) {
                console.error('Error posting outfit:', error);
                showMessage('Error posting outfit: ' + error.message, 'error');
                submitBtn.disabled = false;
                submitBtn.textContent = 'Post Outfit';
            }
        });

        // Cancel button
        document.getElementById('cancel-btn').addEventListener('click', () => {
            window.location.href = 'fits.html';
        });

        // Message display helper
        function showMessage(message, type = 'info') {
            const container = document.getElementById('message-container');
            const className = type === 'error' ? 'error-message' : 'success-message';
            container.innerHTML = `<div class="${className}">${message}</div>`;

            if (type === 'info') {
                setTimeout(() => {
                    container.innerHTML = '';
                }, 3000);
            }
        }
    </script>
</body>
</html>
