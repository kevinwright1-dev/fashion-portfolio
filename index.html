<body>
    <nav>
        <a href="index.html">HOME</a>
        <a href="closet.html">CLOSET</a>
        <a href="fits.html">FIT</a>
        <a href="inspo.html">INSPO</a>

    <h1>Fashion Sense</h1>

    <div style="text-align: center;">
        <img src="pics\IMG_7358.jpeg" alt="Vibe" style="max-width: 400px; border: 1px solid #333;">

    </div>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script>
    const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

    // Check if user is logged in and update nav
    supabase.auth.getSession().then(({ data: { session } }) => {
        if (session) {
            const nav = document.querySelector('nav');
            nav.innerHTML += '<a href="profile.html">PROFILE</a><a href="#" onclick="logout()">LOGOUT</a>';
        } else {
            const nav = document.querySelector('nav');
            nav.innerHTML += '<a href="auth.html">LOGIN</a>';
        }
    });

    async function logout() {
        await supabase.auth.signOut();
        window.location.reload();
    }
</script>

</body>
</html>
