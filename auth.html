<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up / Login - Fashion Closet</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <style>
        .auth-container {
            max-width: 450px;
            margin: 4rem auto;
            background: #111;
            padding: 3rem;
            border: 1px solid #222;
            border-radius: 8px;
        }
        
        .auth-tabs {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            border-bottom: 1px solid #333;
        }
        
        .auth-tab {
            padding: 1rem;
            cursor: pointer;
            color: #666;
            border-bottom: 2px solid transparent;
            transition: all 0.3s;
        }
        
        .auth-tab.active {
            color: #fff;
            border-bottom-color: #fff;
        }
        
        .auth-form {
            display: none;
        }
        
        .auth-form.active {
            display: block;
        }
        
        .error-message {
            background: #ff000020;
            border: 1px solid #ff0000;
            color: #ff6b6b;
            padding: 1rem;
            margin-bottom: 1rem;
            border-radius: 4px;
            font-size: 0.9rem;
        }
        
        .success-message {
            background: #00ff0020;
            border: 1px solid #00ff00;
            color: #6bff6b;
            padding: 1rem;
            margin-bottom: 1rem;
            border-radius: 4px;
            font-size: 0.9rem;
        }
        
        .form-group {
            margin-bottom: 1.5rem;
        }
        
        .username-hint {
            font-size: 0.75rem;
            color: #666;
            margin-top: 0.25rem;
        }
        
        .loading {
            opacity: 0.6;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <nav>
        <a href="index.html">HOME</a>
        <a href="closet.html">CLOSET</a>
        <a href="fits.html">FIT</a>
        <a href="inspo.html">INSPO</a>
        <a href="guestbook.html">COMMENTS</a>
    </nav>

    <div class="auth-container">
        <h1 style="text-align: center; margin-bottom: 2rem; font-size: 2rem;">Welcome</h1>
        
        <div class="auth-tabs">
            <div class="auth-tab active" data-tab="signup">Sign Up</div>
            <div class="auth-tab" data-tab="login">Login</div>
        </div>

        <div id="error-container"></div>
        <div id="success-container"></div>

        <!-- Sign Up Form -->
        <form id="signup-form" class="auth-form active">
            <div class="form-group">
                <label for="signup-email">Email:</label>
                <input type="email" id="signup-email" required>
            </div>

            <div class="form-group">
                <label for="signup-username">Username:</label>
                <input type="text" id="signup-username" pattern="[a-zA-Z0-9_]{3,30}" required>
                <div class="username-hint">3-30 characters, letters, numbers, and underscores only</div>
            </div>

            <div class="form-group">
                <label for="signup-fullname">Full Name (optional):</label>
                <input type="text" id="signup-fullname">
            </div>

            <div class="form-group">
                <label for="signup-password">Password:</label>
                <input type="password" id="signup-password" minlength="6" required>
            </div>

            <div class="form-group">
                <label for="signup-confirm">Confirm Password:</label>
                <input type="password" id="signup-confirm" minlength="6" required>
            </div>

            <button type="submit">Create Account</button>
        </form>

        <!-- Login Form -->
        <form id="login-form" class="auth-form">
            <div class="form-group">
                <label for="login-email">Email:</label>
                <input type="email" id="login-email" required>
            </div>

            <div class="form-group">
                <label for="login-password">Password:</label>
                <input type="password" id="login-password" required>
            </div>

            <button type="submit">Login</button>
            
            <div style="text-align: center; margin-top: 1rem;">
                <a href="#" id="forgot-password-link" style="color: #666; font-size: 0.9rem;">Forgot password?</a>
            </div>
        </form>
    </div>

    <script>
        // Initialize Supabase client
        const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);

        // Check if user is already logged in
        checkAuthStatus();

        async function checkAuthStatus() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (session) {
                window.location.href = 'profile.html';
            }
        }

        // Setup tab switching
        document.querySelectorAll('.auth-tab').forEach(tab => {
            tab.addEventListener('click', function() {
                const tabName = this.getAttribute('data-tab');
                switchTab(tabName, this);
            });
        });

        function switchTab(tab, element) {
            document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
            element.classList.add('active');

            document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
            document.getElementById(tab + '-form').classList.add('active');

            clearMessages();
        }

        function showError(message) {
            const container = document.getElementById('error-container');
            container.innerHTML = `<div class="error-message">${message}</div>`;
        }

        function showSuccess(message) {
            const container = document.getElementById('success-container');
            container.innerHTML = `<div class="success-message">${message}</div>`;
        }

        function clearMessages() {
            document.getElementById('error-container').innerHTML = '';
            document.getElementById('success-container').innerHTML = '';
        }

        // Sign Up Form Handler
        document.getElementById('signup-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            clearMessages();

            console.log('Signup form submitted');

            const email = document.getElementById('signup-email').value;
            const username = document.getElementById('signup-username').value;
            const fullName = document.getElementById('signup-fullname').value;
            const password = document.getElementById('signup-password').value;
            const confirmPassword = document.getElementById('signup-confirm').value;

            if (password !== confirmPassword) {
                showError('Passwords do not match');
                return;
            }

            if (!/^[a-zA-Z0-9_]{3,30}$/.test(username)) {
                showError('Username must be 3-30 characters and contain only letters, numbers, and underscores');
                return;
            }

            // Check if username is already taken
            const { data: existingUser } = await supabaseClient
                .from('profiles')
                .select('username')
                .eq('username', username)
                .single();

            if (existingUser) {
                showError('Username is already taken');
                return;
            }

            const form = e.target;
            form.classList.add('loading');

            try {
                console.log('Attempting signup...');
                
                const { data, error } = await supabaseClient.auth.signUp({
                    email,
                    password,
                    options: {
                        data: {
                            username,
                            full_name: fullName
                        }
                    }
                });

                console.log('Signup response:', { data, error });

                if (error) throw error;

                showSuccess('Account created! Check your email to confirm your account.');
                form.reset();

                setTimeout(() => {
                    window.location.href = 'profile.html';
                }, 2000);

            } catch (error) {
                console.error('Signup error:', error);
                showError(error.message);
            } finally {
                form.classList.remove('loading');
            }
        });

        // Login Form Handler
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            clearMessages();

            console.log('Login form submitted');

            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;

            console.log('Email:', email);

            const form = e.target;
            form.classList.add('loading');

            try {
                console.log('Attempting login...');
                
                const { data, error } = await supabaseClient.auth.signInWithPassword({
                    email,
                    password
                });

                console.log('Login response:', { data, error });

                if (error) throw error;

                showSuccess('Login successful! Redirecting...');
                
                setTimeout(() => {
                    window.location.href = 'profile.html';
                }, 1000);

            } catch (error) {
                console.error('Login error:', error);
                showError(error.message);
            } finally {
                form.classList.remove('loading');
            }
        });

        // Forgot Password Handler
        document.getElementById('forgot-password-link').addEventListener('click', async (e) => {
            e.preventDefault();
            const email = prompt('Enter your email address:');
            if (!email) return;

            clearMessages();

            try {
                const { error } = await supabaseClient.auth.resetPasswordForEmail(email, {
                    redirectTo: window.location.origin + '/reset-password.html'
                });

                if (error) throw error;

                showSuccess('Password reset email sent! Check your inbox.');
            } catch (error) {
                showError(error.message);
            }
        });

        // Listen for auth state changes
        supabaseClient.auth.onAuthStateChange((event, session) => {
            console.log('Auth state changed:', event);
            if (event === 'SIGNED_IN') {
                window.location.href = 'profile.html';
            }
        });
    </script>
</body>
</html>
