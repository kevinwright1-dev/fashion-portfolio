<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FITS - Fashion Closet</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <style>
        .fits-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        .add-outfit-btn {
            background: #000;
            color: #fff;
            border: 1px solid #fff;
            padding: 0.7rem 2rem;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-decoration: none;
            display: inline-block;
        }

        .add-outfit-btn:hover {
            background: #222;
        }

        .filters {
            display: flex;
            gap: 0.75rem;
            align-items: center;
            margin-bottom: 1.25rem;
            flex-wrap: wrap;
        }

        .filter-btn {
            background: transparent;
            color: #666;
            border: 1px solid #333;
            padding: 0.5rem 1rem;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 1px;
        }

        .filter-btn.active {
            background: #fff;
            color: #000;
            border-color: #fff;
        }

        .filter-btn:hover {
            border-color: #999;
            color: #999;
        }

        #fit-search {
            margin-left: auto;
            min-width: 240px;
            max-width: 360px;
        }

        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: #666;
        }

        .empty-state p {
            margin-bottom: 2rem;
        }

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1000;
        }

        .modal-backdrop {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            cursor: pointer;
        }

        .modal-content {
            position: relative;
            max-width: 1200px;
            max-height: 90vh;
            margin: 2rem auto;
            background: #111;
            border: 1px solid #333;
            border-radius: 8px;
            overflow-y: auto;
            z-index: 1001;
        }

        .modal-close {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: #ff6b6b;
            color: #000;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            font-size: 1.5rem;
            cursor: pointer;
            z-index: 1002;
            font-weight: bold;
        }

        .modal-close:hover {
            background: #ff4444;
        }

        @media (max-width: 768px) {
            #fit-search {
                margin-left: 0;
                width: 100%;
                max-width: none;
                min-width: 0;
            }
        }
    </style>
</head>
<body>
    <nav>
        <a href="index.html">HOME</a>
        <a href="closet.html">CLOSET</a>
        <a href="fits.html">FIT</a>
        <a href="inspo.html">INSPO</a>
        <a href="guestbook.html">COMMENTS</a>
        <a href="profile.html" id="profile-link" style="display:none;">PROFILE</a>
        <a href="auth.html" id="auth-link">LOGIN</a>
    </nav>

    <div class="fits-header">
        <h1>FITS</h1>
        <a href="add-outfit.html" class="add-outfit-btn" id="add-outfit-btn" style="display:none;">+ Share Fit</a>
    </div>

    <div class="filters">
        <button class="filter-btn active" data-feed="all">All Fits</button>
        <button class="filter-btn" data-feed="mine" id="my-fits-filter" style="display:none;">My Fits</button>
        <input type="search" id="fit-search" placeholder="Search title or username...">
    </div>

    <div id="loading" style="text-align: center; padding: 2rem; color: #666;">
        Loading fits...
    </div>

    <div class="gallery" id="outfits-gallery" style="display: none;">
    </div>

    <div id="empty-state" class="empty-state" style="display: none;">
        <p style="font-size: 3rem;">&#128084;</p>
        <p>No fits yet</p>
        <a href="add-outfit.html" class="add-outfit-btn">Share Your First Fit</a>
    </div>

    <div id="outfit-modal" class="modal" style="display: none;">
        <div class="modal-backdrop"></div>
        <div class="modal-content">
            <button class="modal-close" id="close-modal-btn">&times;</button>
            <div id="modal-body">
                <p style="text-align: center; padding: 3rem; color: #666;">Loading...</p>
            </div>
        </div>
    </div>

    <script>
        const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);
        let currentUser = null;
        let allOutfits = [];
        let activeFeed = 'all';

        init();

        document.getElementById('close-modal-btn').addEventListener('click', closeModal);
        document.querySelector('.modal-backdrop')?.addEventListener('click', closeModal);
        document.addEventListener('keydown', (event) => {
            if (event.key === 'Escape') {
                closeModal();
            }
        });

        async function init() {
            const { data: { session } } = await supabaseClient.auth.getSession();

            if (session) {
                currentUser = session.user;
                document.getElementById('profile-link').style.display = 'inline';
                document.getElementById('add-outfit-btn').style.display = 'inline-block';
                document.getElementById('auth-link').style.display = 'none';
                document.getElementById('my-fits-filter').style.display = 'inline-block';
            }

            setupFilters();
            await loadOutfits();
        }

        async function loadOutfits() {
            try {
                const { data, error } = await supabaseClient
                    .from('outfits')
                    .select(`
                        *,
                        profiles (username, avatar_url),
                        outfit_items (
                            clothing_item_id,
                            tag_position_x,
                            tag_position_y,
                            clothing_items (*)
                        )
                    `)
                    .order('created_at', { ascending: false });

                if (error) throw error;

                allOutfits = data || [];
                applyCurrentFilters();

                document.getElementById('loading').style.display = 'none';
            } catch (error) {
                console.error('Error loading outfits:', error);
                document.getElementById('loading').textContent = 'Error loading outfits';
            }
        }

        function setupFilters() {
            document.querySelectorAll('.filter-btn').forEach((btn) => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.filter-btn').forEach((node) => node.classList.remove('active'));
                    btn.classList.add('active');
                    activeFeed = btn.dataset.feed;
                    applyCurrentFilters();
                });
            });

            document.getElementById('fit-search').addEventListener('input', applyCurrentFilters);
        }

        function applyCurrentFilters() {
            const searchText = document.getElementById('fit-search').value.trim().toLowerCase();

            const filtered = allOutfits.filter((outfit) => {
                const username = (outfit.profiles?.username || '').toLowerCase();
                const title = (outfit.title || '').toLowerCase();
                const minePass = activeFeed !== 'mine' || (currentUser && outfit.user_id === currentUser.id);
                const searchPass = !searchText || username.includes(searchText) || title.includes(searchText);
                return minePass && searchPass;
            });

            displayOutfits(filtered);
        }

        function displayOutfits(outfits) {
            const gallery = document.getElementById('outfits-gallery');
            const emptyState = document.getElementById('empty-state');

            if (outfits.length === 0) {
                gallery.style.display = 'none';
                emptyState.style.display = 'block';
                return;
            }

            gallery.style.display = 'grid';
            emptyState.style.display = 'none';

            gallery.innerHTML = outfits.map(outfit => {
                const tagCount = outfit.outfit_items ? outfit.outfit_items.length : 0;
                const username = outfit.profiles ? outfit.profiles.username : 'Unknown';

                return `
                    <div class="gallery-item">
                        <img src="${outfit.image_url}" alt="${outfit.title}" onclick="viewOutfit('${outfit.id}')">
                        <p><strong>${outfit.title}</strong></p>
                        <p style="font-size: 0.75rem; color: #999;">by @${username}</p>
                        <p style="font-size: 0.75rem; color: #666;">
                            ${tagCount > 0 ? `${tagCount} item${tagCount === 1 ? '' : 's'} tagged` : 'No items tagged'}
                        </p>
                        <p style="font-size: 0.75rem; color: #666;">
                            Likes: ${outfit.likes_count || 0} | Comments: ${outfit.comments_count || 0}
                        </p>
                    </div>
                `;
            }).join('');
        }

        function viewOutfit(outfitId) {
            openModal(outfitId);
        }

        function openModal(outfitId) {
            const modal = document.getElementById('outfit-modal');
            modal.style.display = 'block';
            document.body.style.overflow = 'hidden';
            loadOutfitDetail(outfitId);
        }

        function loadOutfitDetail(outfitId) {
            const modalBody = document.getElementById('modal-body');
            modalBody.innerHTML = `
                <iframe
                    src="outfit-detail.html?id=${encodeURIComponent(outfitId)}"
                    title="Outfit Detail"
                    style="width:100%; height:85vh; border:none; background:#111;"
                    loading="lazy"
                ></iframe>
            `;
        }

        function closeModal() {
            const modal = document.getElementById('outfit-modal');
            modal.style.display = 'none';
            document.getElementById('modal-body').innerHTML = '<p style="text-align: center; padding: 3rem; color: #666;">Loading...</p>';
            document.body.style.overflow = 'auto';
        }
    </script>
</body>
</html>
